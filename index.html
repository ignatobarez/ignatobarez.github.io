<!DOCTYPE html>
<html lang="es">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Music</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <!-- Menú lateral -->
    <aside>

        <h2>🎵 Mymusic</h2>

        <ul>
            <li>🏠 Inicio</li>
            <li>🔍 Buscar</li>
            <li>📚 Biblioteca</li>
            <li>❤️ Favoritos</li>
        </ul>

    </aside>

    <!-- Contenido principal -->
    <main>

        <header>

            <h1>Buenas tardes</h1>

            <p>Selecciona una canción de la lista.</p>

        </header>

        <!-- Buscador -->
        <div class="buscador">

            <input
                type="text"
                id="buscar"
                placeholder="🔍 Buscar canción..."
            >

        </div>

        <!-- Lista de canciones -->
        <div id="listaCanciones" class="lista">

            <!-- JavaScript añadirá las canciones aquí -->

        </div>

    </main>

    <!-- Reproductor -->
    <footer>

        <!-- Información -->
     <div class="info">

    <img id="cover" src="img/album1.jpg">

    <div>

        <h3 id="titulo">Ninguna canción</h3>

        <p id="artista">Selecciona una canción</p>

        <div id="equalizer" class="equalizer">

            <span></span>
            <span></span>
            <span></span>
            <span></span>

        </div>

    </div>

</div>

        <!-- Controles -->
        <div class="controles">

            <button id="anterior">⏮</button>

            <button id="play">▶</button>

            <button id="siguiente">⏭</button>

        </div>

        <!-- Barra -->
        <div class="progreso">

            <span id="actual">0:00</span>

            <input
                type="range"
                id="barra"
                value="0"
            >

            <span id="duracion">0:00</span>

        </div>

        <!-- Volumen -->
        <div class="volumen">

            🔊

            <input
                type="range"
                id="volumen"
                min="0"
                max="1"
                step="0.01"
                value="1"
            >

        </div>

    </footer>

    <!-- Audio -->
    <audio id="audio"></audio>

    <script src="script.js"></script>

</body>
</html>
