<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Spotify</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <aside>

        <h2>MiSpotify</h2>

        <ul>
            <li>🏠 Inicio</li>
            <li>🔍 Buscar</li>
            <li>📚 Biblioteca</li>
            <li>❤️ Favoritos</li>
        </ul>

    </aside>

    <main>

        <header>

            <h1>Buenas tardes</h1>
            <p>Escucha tu música favorita</p>

        </header>

        <div class="cards">

            <div class="card">
                <img src="https://picsum.photos/300?1">
                <h3>Pop Hits</h3>
                <p>Los éxitos del momento.</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300?2">
                <h3>Rock</h3>
                <p>Los clásicos.</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300?3">
                <h3>Lo-Fi</h3>
                <p>Para estudiar.</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300?4">
                <h3>Electrónica</h3>
                <p>Las mejores mezclas.</p>
            </div>

        </div>

    </main>

    <footer>

        <div>

            <strong>🎵 Canción actual</strong><br>
            Artista

        </div>

        <div>

            <button>⏮</button>
            <button onclick="playSong()">▶</button>
            <button>⏭</button>

        </div>

        <div>

            00:00 / 03:45

        </div>

    </footer>

<script src="script.js"></script>

</body>
</html>
