<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MiSpotify</title><link rel="stylesheet" href="style.css"></head>
<body>
<aside><h2>🎵 MiSpotify</h2></aside>
<main><input id="buscar" placeholder="Buscar..."><div id="listaCanciones"></div></main>
<footer>
<div><img id="cover" src="" width="50"><div><h3 id="titulo">Selecciona una canción</h3><p id="artista"></p></div></div>
<div><button id="anterior">⏮</button><button id="play">▶</button><button id="siguiente">⏭</button></div>
<div><span id="actual">0:00</span><input id="barra" type="range"><span id="duracion">0:00</span></div>
<div>🔊<input id="volumen" type="range" min="0" max="1" step="0.01" value="1"></div>
</footer>
<audio id="audio"></audio>
<script src="script.js"></script>
</body></html>
